<section id="p5" class="panel" aria-label="rounds table">
  <header class="panel-header">
    <h2>Rounds</h2>
    <p class="hint">click a row to expand the round summary inline.</p>
  </header>
  <div class="table-wrap">
    <table data-role="rounds-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Decision</th>
          <th>Description</th>
          <th>Step Geomean</th>
          <th>vs Baseline</th>
          <th>At</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div data-role="rounds-empty" class="empty" hidden>No round data yet.</div>
</section>

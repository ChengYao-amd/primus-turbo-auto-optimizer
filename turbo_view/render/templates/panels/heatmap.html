<section id="p4" class="panel" aria-label="per-shape heatmap">
  <header class="panel-header">
    <h2>Per-shape heatmap</h2>
    <p class="hint">rows = rounds, columns = shapes. cell colour = Δ% vs baseline round.</p>
  </header>
  <div class="heatmap-controls">
    <label><input type="radio" name="heatmap-direction" value="fwd" checked> forward</label>
    <label><input type="radio" name="heatmap-direction" value="bwd"> backward</label>
  </div>
  <div class="heatmap-wrap" data-role="heatmap-wrap"></div>
  <div data-role="heatmap-empty" class="empty" hidden>No bench data yet.</div>
</section>
